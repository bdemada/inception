services:
  # ── MariaDB ───────────────────────────────────────────────────────────────
  mariadb:
    build:
      context: ./mariadb
    pull_policy: build
    container_name: mariadb
    restart: always
    secrets:
      - db_root_password
      - db_name
      - db_user
      - db_password
    env_file:
      - ../.env
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - inception_net

  # ── WordPress + PHP-FPM ───────────────────────────────────────────────────
  wordpress:
    build:
      context: ./wordpress
    pull_policy: build
    container_name: wordpress
    restart: always
    depends_on:
      - mariadb
    env_file: ../.env
    secrets:
      - db_name
      - db_user
      - db_password
      - wp_admin_password
      - wp_admin_email
      - wp_user_password
      - wp_user_email
    environment:
      WORDPRESS_TITLE:   "My awesome inception site, by $(LOGIN)"
    volumes:
      - wp_data:/var/www/html
    networks:
      - inception_net

  # ── Nginx ─────────────────────────────────────────────────────────────────
  nginx:
    build:
      context: ./nginx
    pull_policy: build
    container_name: nginx
    restart: always
    depends_on:
      - wordpress
    env_file: ../.env
    ports:
      - "443:443"                         # sole exposed port for HTTPS
    volumes:
      - wp_data:/var/www/html:ro
    networks:
      - inception_net

# ── Secrets ───────────────────────────────────────────────────────────────
secrets:
  db_root_password:  { file: ../secrets/db_root_password.txt }
  db_name:           { file: ../secrets/db_name.txt }
  db_user:           { file: ../secrets/db_user.txt }
  db_password:       { file: ../secrets/db_password.txt }
  wp_admin_password: { file: ../secrets/wp_admin_password.txt }
  wp_admin_email:    { file: ../secrets/wp_admin_email.txt }
  wp_user_password:  { file: ../secrets/wp_user_password.txt }
  wp_user_email:     { file: ../secrets/wp_user_email.txt }

# ── Named volumes ─────────────────────────────────────────────────────────
volumes:
  mariadb_data:
  wp_data:

# ── Single network ────────────────────────────────────────────────────────
networks:
  inception_net:
    driver: bridge
    name: inception_net
